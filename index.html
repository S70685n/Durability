<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cycle Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #151515, #000);
  color: gold;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: rgba(20,20,20,0.95);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,215,0,0.06);
}

h1,h2,h3 {
  margin-top: 0;
}

.tabs {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.tab {
  padding: 12px 16px;
  border-radius: 12px;
  background: #1b1b1b;
  border: 1px solid #333;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.tab.active {
  background: gold;
  color: black;
  box-shadow: 0 0 12px rgba(255,215,0,0.4);
}

.topRow {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.kpi {
  background: #111;
  border: 1px solid #222;
  border-radius: 16px;
  padding: 18px;
}

.kpiTitle {
  color: #aaa;
  font-size: 13px;
}

.kpiValue {
  font-size: 28px;
  margin-top: 8px;
  font-weight: bold;
}

.nameInput,
#cycleInput {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  background: #0f0f0f;
  border: 1px solid #333;
  color: gold;
  outline: none;
}

.nameInput:focus,
#cycleInput:focus {
  border-color: gold;
}

#cycleInput {
  font-size: 36px;
}

.progressWrap {
  margin-top: 15px;
}

.progressBar {
  width: 100%;
  height: 18px;
  background: #222;
  border-radius: 20px;
  overflow: hidden;
}

.progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ffd700, #ff9f00);
  transition: width 0.3s ease;
  box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.buttonRow {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 15px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

.primary {
  background: gold;
  color: black;
}

.secondary {
  background: #222;
  color: gold;
  border: 1px solid #333;
}

.danger {
  background: darkred;
  color: white;
}

.quickButtons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.quickButtons button {
  flex: 1;
  min-width: 90px;
}

.logs {
  margin-top: 15px;
}

.log {
  display: flex;
  justify-content: space-between;
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 12px;
  margin-top: 8px;
}

.chartWrap {
  margin-top: 20px;
}

.small {
  color: #aaa;
  font-size: 13px;
}

@media (max-width: 700px) {
  #cycleInput {
    font-size: 28px;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="card">

    <div class="tabs" id="tabs"></div>

    <div class="buttonRow">
      <button class="secondary" onclick="addCounter()">+ Add Counter</button>
      <button class="danger" onclick="resetAll()">TOTAL RESET</button>
    </div>

  </div>

  <div class="card">

    <h2>Damper Serial Number</h2>

    <input
      id="counterName"
      class="nameInput"
      placeholder="Counter Name"
      oninput="renameCounter()"
    />

  </div>

  <div class="card">

    <div class="topRow">

      <div class="kpi">
        <div class="kpiTitle">Accumulated</div>
        <div class="kpiValue" id="totalCycles">0</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Progress</div>
        <div class="kpiValue" id="progressPercent">0%</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Average / Day</div>
        <div class="kpiValue" id="avgPerDay">0</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Remaining</div>
        <div class="kpiValue" id="remaining">0</div>
      </div>

    </div>

  </div>

  <div class="card">

    <h2>Today's Cycles</h2>

    <input
      id="cycleInput"
      placeholder="Enter cycles"
      oninput="updateInput()"
    />

    <div class="quickButtons">
      <button class="secondary" onclick="quickAdd(100)">+100</button>
      <button class="secondary" onclick="quickAdd(500)">+500</button>
      <button class="secondary" onclick="quickAdd(1000)">+1000</button>
      <button class="secondary" onclick="quickAdd(5000)">+5000</button>
    </div>

    <div class="progressWrap">
      <div class="small" id="progressText"></div>

      <div class="progressBar">
        <div class="progressFill" id="progressFill"></div>
      </div>
    </div>

    <div class="buttonRow">
      <button class="primary" onclick="saveToday()">Save Today</button>
    </div>

  </div>

  <div class="card">

    <h2>Progress Graph</h2>

    <div class="chartWrap">
      <canvas id="productionChart"></canvas>
    </div>

  </div>

  <div class="card">

    <h2>Daily Logs</h2>

    <div class="logs" id="logs"></div>

  </div>

</div>

<script>
const TARGET = 1000000;

let trackers = JSON.parse(localStorage.getItem('trackers')) || [
  {
    name: 'Damper 1',
    today: '',
    logs: []
  },
  {
    name: 'Damper 2',
    today: '',
    logs: []
  }
];

let active = 0;
let chart;

function saveData() {
  localStorage.setItem('trackers', JSON.stringify(trackers));
}

function activeTracker() {
  return trackers[active];
}

function switchTab(index) {
  active = index;
  render();
}

function addCounter() {
  trackers.push({
    name: `Counter ${trackers.length + 1}`,
    today: '',
    logs: []
  });

  active = trackers.length - 1;

  saveData();
  render();
}

function renameCounter() {
  activeTracker().name = document.getElementById('counterName').value || 'Unnamed';
  saveData();
  renderTabs();
}

function updateInput() {
  let val = document.getElementById('cycleInput').value.replace(/[^0-9]/g, '');

  activeTracker().today = val;
  saveData();
}

function quickAdd(amount) {
  let current = Number(activeTracker().today || 0);
  activeTracker().today = current + amount;

  saveData();
  render();
}

function saveToday() {
  let tracker = activeTracker();

  let now = new Date();

  tracker.logs.unshift({
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    cycles: Number(tracker.today || 0)
  });

  tracker.today = '';

  saveData();
  render();
}

function resetAll() {
  if (confirm('DELETE ALL COUNTERS AND LOGS?')) {

    trackers = [
      {
        name: 'Damper 1',
        today: '',
        logs: []
      },
      {
        name: 'Damper 2',
        today: '',
        logs: []
      }
    ];

    active = 0;

    saveData();
    render();
  }
}

function renderTabs() {
  let html = '';

  trackers.forEach((t, i) => {
    html += `
      <div
        class="tab ${i === active ? 'active' : ''}"
        onclick="switchTab(${i})"
      >
        ${t.name}
      </div>
    `;
  });

  document.getElementById('tabs').innerHTML = html;
}

function updateChart(logs) {

  const labels = [...logs]
    .reverse()
    .map(l => l.date);

  const values = [...logs]
    .reverse()
    .map(l => l.cycles);

  const ctx = document.getElementById('productionChart');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Cycles',
        data: values,
        borderWidth: 3,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: {
            color: 'gold'
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: 'gold'
          },
          grid: {
            color: '#222'
          }
        },
        y: {
          ticks: {
            color: 'gold'
          },
          grid: {
            color: '#222'
          }
        }
      }
    }
  });
}

function render() {

  let t = activeTracker();

  let total = t.logs.reduce((sum, l) => sum + Number(l.cycles), 0);

  let percent = Math.min((total / TARGET) * 100, 100);

  let avg = t.logs.length
    ? Math.round(total / t.logs.length)
    : 0;

  renderTabs();

  document.getElementById('counterName').value = t.name;

  document.getElementById('cycleInput').value = t.today;

  document.getElementById('totalCycles').innerText = total.toLocaleString();

  document.getElementById('progressPercent').innerText = percent.toFixed(2) + '%';

  document.getElementById('avgPerDay').innerText = avg.toLocaleString();

  document.getElementById('remaining').innerText = (TARGET - total).toLocaleString();

  document.getElementById('progressText').innerText =
    `${total.toLocaleString()} / ${TARGET.toLocaleString()}`;

  document.getElementById('progressFill').style.width = percent + '%';

  let logsHTML = '';

  t.logs.forEach(l => {
    logsHTML += `
      <div class="log">
        <div>
          <div>${l.date}</div>
          <div class="small">${l.time}</div>
        </div>

        <div>
          ${Number(l.cycles).toLocaleString()}
        </div>
      </div>
    `;
  });

  document.getElementById('logs').innerHTML = logsHTML;

  updateChart(t.logs);
}

render();
</script>

</body>
</html>
