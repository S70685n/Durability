<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cycle Tracker Pro</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #111, #000);
    color: gold;
    display: flex;
    justify-content: center;
    padding: 25px;
  }

  .container { width: 100%; max-width: 650px; }

  .card {
    background: rgba(20, 20, 20, 0.95);
    border-radius: 18px;
    padding: 20px;
    border: 1px solid rgba(255, 215, 0, 0.2);
  }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .tab {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }

  .tab.active {
    background: gold;
    color: black;
  }

  .tab input {
    width: 100%;
    border: none;
    background: transparent;
    color: inherit;
    text-align: center;
    font-weight: bold;
    outline: none;
    font-size: 14px;
  }

  h1 { margin: 10px 0; }

  input#cycleInput {
    width: 100%;
    font-size: 34px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #0d0d0d;
    color: gold;
  }

  .bar {
    height: 14px;
    background: #222;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
  }

  .fill {
    height: 100%;
    background: gold;
    width: 0%;
    transition: width 0.3s;
  }

  .row { display: flex; gap: 10px; margin-top: 15px; }

  button {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .save { background: gold; }
  .reset { background: darkred; color: white; }

  .log {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #222;
  }
</style>
</head>

<body>

<div class="container">
<div class="card">

  <div class="tabs" id="tabs"></div>

  <h1 id="title"></h1>

  <input id="cycleInput" oninput="updateInput()" placeholder="Enter cycles" />

  <div id="percent" style="margin-top:10px;"></div>

  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>

  <div class="row">
    <button class="save" onclick="save()">Save</button>
    <button class="reset" onclick="resetAll()">Reset</button>
  </div>

  <p id="total"></p>

  <div id="logs"></div>

</div>
</div>

<script>
const TARGET = 1000000;

let trackers = JSON.parse(localStorage.getItem("trackers")) || [
  { name: "Counter 1", today: "", logs: [] },
  { name: "Counter 2", today: "", logs: [] }
];

let active = 0;
let editing = null;

function saveData() {
  localStorage.setItem("trackers", JSON.stringify(trackers));
}

/* SWITCH TAB */
function switchTab(i) {
  active = i;
  render();
}

/* START EDIT NAME */
function startEdit(i) {
  editing = i;
  render();
}

/* SAVE NAME */
function saveName(i, val) {
  trackers[i].name = val || "Unnamed";
  editing = null;
  saveData();
  render();
}

/* INPUT */
function updateInput() {
  let val = document.getElementById("cycleInput")
    .value.replace(/[^0-9]/g, "");

  trackers[active].today = val;
  saveData();
}

/* SAVE DAY */
function save() {
  let today = new Date().toLocaleDateString();

  trackers[active].logs = trackers[active].logs.filter(l => l.date !== today);

  trackers[active].logs.unshift({
    date: today,
    cycles: Number(trackers[active].today || 0)
  });

  trackers[active].today = "";
  saveData();
  render();
}

/* RESET */
function resetAll() {
  if (confirm("Reset everything?")) {
    trackers = [
      { name: "Counter 1", today: "", logs: [] },
      { name: "Counter 2", today: "", logs: [] }
    ];
    active = 0;
    saveData();
    render();
  }
}

/* CLICK OUTSIDE = STOP EDIT */
document.addEventListener("click", () => {
  if (editing !== null) {
    editing = null;
    render();
  }
});

/* RENDER */
function render() {
  let t = trackers[active];

  let total = t.logs.reduce((s, l) => s + Number(l.cycles), 0);
  let percent = Math.min((total / TARGET) * 100, 100);

  document.getElementById("title").innerText = t.name;
  document.getElementById("cycleInput").value = t.today;

  document.getElementById("percent").innerText =
    percent.toFixed(2) + "% Complete";

  document.getElementById("fill").style.width = percent + "%";

  document.getElementById("total").innerText =
    "Total: " + total.toLocaleString();

  /* TABS */
  let html = "";

  trackers.forEach((t, i) => {
    html += `
      <div class="tab ${i === active ? "active" : ""}"
           onclick="switchTab(${i})"
           ondblclick="startEdit(${i})">

        ${
          editing === i
            ? `<input autofocus
                value="${t.name}"
                onblur="saveName(${i}, this.value)"
                onkeydown="if(event.key==='Enter'){this.blur()}">`
            : t.name
        }

      </div>
    `;
  });

  document.getElementById("tabs").innerHTML = html;

  /* LOGS */
  let logs = "";
  t.logs.forEach(l => {
    logs += `
      <div class="log">
        <span>${l.date}</span>
        <span>${Number(l.cycles).toLocaleString()}</span>
      </div>
    `;
  });

  document.getElementById("logs").innerHTML = logs;
}

render();
</script>

</body>
</html>
