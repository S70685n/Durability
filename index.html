<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cycle Tracker Pro</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: gold;
    display: flex;
    justify-content: center;
    padding: 25px;
  }

  .container {
    width: 100%;
    max-width: 700px;
  }

  .card {
    background: rgba(20, 20, 20, 0.95);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,215,0,0.2);
    box-shadow: 0 0 20px rgba(255,215,0,0.08);
  }

  /* TOP BAR */
  .topBar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .nameInput {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 12px;
    color: gold;
    font-size: 16px;
    outline: none;
  }

  .nameInput:focus {
    border-color: gold;
    box-shadow: 0 0 10px rgba(255,215,0,0.25);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    background: #1a1a1a;
    border: 1px solid #333;
    transition: 0.2s;
    font-weight: bold;
  }

  .tab.active {
    background: gold;
    color: black;
    box-shadow: 0 0 15px rgba(255,215,0,0.45);
  }

  h1 {
    margin: 10px 0;
    font-size: 28px;
  }

  /* CYCLE INPUT */
  #cycleInput {
    width: 100%;
    font-size: 40px;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #333;
    background: #0d0d0d;
    color: gold;
    outline: none;
    box-sizing: border-box;
  }

  #cycleInput:focus {
    border-color: gold;
    box-shadow: 0 0 12px rgba(255,215,0,0.25);
  }

  /* PROGRESS */
  .percent {
    margin-top: 12px;
    color: #ccc;
    font-size: 15px;
  }

  .bar {
    width: 100%;
    height: 16px;
    background: #222;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ffd700, #ffb300);
    transition: width 0.3s ease;
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
  }

  /* BUTTONS */
  .row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.02);
  }

  .save {
    background: gold;
    color: black;
  }

  .danger {
    background: darkred;
    color: white;
  }

  /* TOTAL */
  .total {
    margin-top: 12px;
    color: #aaa;
    font-size: 15px;
  }

  /* LOGS */
  .logs {
    margin-top: 15px;
  }

  .log {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    background: #111;
    border-radius: 10px;
    margin-top: 6px;
    border: 1px solid #222;
  }

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- EASY TAB NAME EDIT -->
    <div class="topBar">
      <input
        id="tabNameInput"
        class="nameInput"
        placeholder="Counter Name"
        oninput="renameActiveTab()"
      />
    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs"></div>

    <!-- TITLE -->
    <h1 id="title"></h1>

    <!-- CYCLE INPUT -->
    <input
      id="cycleInput"
      placeholder="Enter today's cycles"
      oninput="updateInput()"
    />

    <!-- PROGRESS -->
    <div class="percent" id="percent"></div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <!-- BUTTONS -->
    <div class="row">
      <button class="save" onclick="save()">Save Today</button>
      <button class="danger" onclick="resetAll()">TOTAL RESET</button>
    </div>

    <!-- TOTAL -->
    <div class="total" id="total"></div>

    <!-- LOGS -->
    <div class="logs" id="logs"></div>

  </div>
</div>

<script>
const TARGET = 1000000;

let trackers = JSON.parse(localStorage.getItem("trackers")) || [
  { name: "Counter 1", today: "", logs: [] },
  { name: "Counter 2", today: "", logs: [] }
];

let active = 0;

function saveData() {
  localStorage.setItem("trackers", JSON.stringify(trackers));
}

/* SWITCH TABS */
function switchTab(i) {
  active = i;
  render();
}

/* EASY TAB RENAME */
function renameActiveTab() {
  trackers[active].name =
    document.getElementById("tabNameInput").value || "Unnamed";

  saveData();
  renderTabs();
}

/* UPDATE INPUT */
function updateInput() {
  let val = document
    .getElementById("cycleInput")
    .value
    .replace(/[^0-9]/g, "");

  trackers[active].today = val;

  saveData();
}

/* SAVE DAILY LOG */
function save() {
  let today = new Date().toLocaleDateString();

  trackers[active].logs =
    trackers[active].logs.filter(l => l.date !== today);

  trackers[active].logs.unshift({
    date: today,
    cycles: Number(trackers[active].today || 0)
  });

  trackers[active].today = "";

  saveData();
  render();
}

/* TOTAL RESET */
function resetAll() {
  if (confirm("⚠️ DELETE ALL COUNTERS AND LOGS?")) {

    trackers = [
      { name: "Counter 1", today: "", logs: [] },
      { name: "Counter 2", today: "", logs: [] }
    ];

    active = 0;

    saveData();
    render();
  }
}

/* RENDER TABS */
function renderTabs() {
  let html = "";

  trackers.forEach((t, i) => {
    html += `
      <div
        class="tab ${i === active ? "active" : ""}"
        onclick="switchTab(${i})"
      >
        ${t.name}
      </div>
    `;
  });

  document.getElementById("tabs").innerHTML = html;
}

/* FULL RENDER */
function render() {

  let t = trackers[active];

  let total =
    t.logs.reduce((s, l) => s + Number(l.cycles), 0);

  let percent =
    Math.min((total / TARGET) * 100, 100);

  renderTabs();

  document.getElementById("title").innerText = t.name;

  document.getElementById("tabNameInput").value = t.name;

  document.getElementById("cycleInput").value = t.today;

  document.getElementById("percent").innerText =
    percent.toFixed(2) + "% Complete";

  document.getElementById("fill").style.width =
    percent + "%";

  document.getElementById("total").innerText =
    "Total: " +
    total.toLocaleString() +
    " / " +
    TARGET.toLocaleString();

  /* LOGS */
  let logsHTML = "";

  t.logs.forEach(l => {
    logsHTML += `
      <div class="log">
        <span>${l.date}</span>
        <span>${Number(l.cycles).toLocaleString()}</span>
      </div>
    `;
  });

  document.getElementById("logs").innerHTML = logsHTML;
}

render();
</script>

</body>
</html>
