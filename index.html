<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Durability Cycle Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#151515,#000);
  color:gold;
  padding:20px;
}

.container{
  max-width:950px;
  margin:auto;
}

.card{
  background:rgba(20,20,20,.95);
  border:1px solid rgba(255,215,0,.15);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,215,0,.05);
}

h1,h2,h3{
  margin-top:0;
}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tab{
  padding:12px 16px;
  border-radius:12px;
  background:#1a1a1a;
  border:1px solid #333;
  cursor:pointer;
  transition:.2s;
  font-weight:bold;
}

.tab.active{
  background:gold;
  color:black;
  box-shadow:0 0 12px rgba(255,215,0,.4);
}

.topRow{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

.kpi{
  background:#111;
  border:1px solid #222;
  border-radius:16px;
  padding:18px;
}

.kpiTitle{
  color:#999;
  font-size:13px;
}

.kpiValue{
  margin-top:8px;
  font-size:28px;
  font-weight:bold;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #333;
  background:#0f0f0f;
  color:gold;
  outline:none;
}

input:focus{
  border-color:gold;
}

#cycleInput{
  font-size:36px;
}

.progressWrap{
  margin-top:15px;
}

.progressText{
  color:#bbb;
  margin-bottom:8px;
}

.progressBar{
  width:100%;
  height:18px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}

.progressFill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ffd700,#ff9f00);
  transition:.3s;
  box-shadow:0 0 12px rgba(255,215,0,.45);
}

.buttonRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

button{
  border:none;
  border-radius:14px;
  padding:14px;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.02);
}

.primary{
  background:gold;
  color:black;
}

.secondary{
  background:#222;
  color:gold;
  border:1px solid #333;
}

.danger{
  background:darkred;
  color:white;
}

.quickButtons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.quickButtons button{
  flex:1;
  min-width:90px;
}

.logs{
  margin-top:15px;
}

.log{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  padding:12px;
  margin-top:8px;
}

.small{
  color:#999;
  font-size:12px;
}

canvas{
  margin-top:15px;
}

@media(max-width:700px){

  #cycleInput{
    font-size:28px;
  }

}

</style>
</head>
<body>

<div class="container">

  <!-- COUNTERS -->
  <div class="card">

    <div class="tabs" id="tabs"></div>

    <div class="buttonRow">

      <button class="secondary" onclick="addCounter()">
        + Add Counter
      </button>

      <button class="danger" onclick="resetCurrentCounter()">
        Reset Current Counter
      </button>

      <button class="danger" onclick="deleteCounter()">
        Delete Counter
      </button>

    </div>

  </div>

  <!-- SETTINGS -->
  <div class="card">

    <h2>Damper Serial Number</h2>

    <input
      id="counterName"
      placeholder="Counter Name"
      oninput="renameCounter()"
    />

  </div>

  <!-- KPI -->
  <div class="card">

    <div class="topRow">

      <div class="kpi">
        <div class="kpiTitle">Accumulated Total</div>
        <div class="kpiValue" id="totalCycles">0</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Progress</div>
        <div class="kpiValue" id="progressPercent">0%</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Remaining</div>
        <div class="kpiValue" id="remaining">0</div>
      </div>

      <div class="kpi">
        <div class="kpiTitle">Average Entry</div>
        <div class="kpiValue" id="avgPerDay">0</div>
      </div>

    </div>

  </div>

  <!-- INPUT -->
  <div class="card">

    <h2>Today's Cycles</h2>

    <input
      id="cycleInput"
      placeholder="Enter current reading"
      oninput="updateInput()"
    />

    <div class="quickButtons">

      <button class="secondary" onclick="quickAdd(100)">
        +100
      </button>

      <button class="secondary" onclick="quickAdd(500)">
        +500
      </button>

      <button class="secondary" onclick="quickAdd(1000)">
        +1000
      </button>

      <button class="secondary" onclick="quickAdd(5000)">
        +5000
      </button>

    </div>

    <div class="progressWrap">

      <div class="progressText" id="progressText"></div>

      <div class="progressBar">
        <div class="progressFill" id="progressFill"></div>
      </div>

    </div>

    <div class="buttonRow">

      <button class="primary" onclick="saveEntry()">
        Save Entry
      </button>

    </div>

  </div>

  <!-- GRAPH -->
  <div class="card">

    <h2>Progress To 1,000,000</h2>

    <canvas id="progressChart"></canvas>

  </div>

  <!-- LOGS -->
  <div class="card">

    <h2>Daily Logs</h2>

    <div class="logs" id="logs"></div>

  </div>

</div>

<script>

const TARGET = 1000000;

let trackers =
JSON.parse(localStorage.getItem("trackers")) || [

  {
    name:"Damper Serial Number",
    today:"",
    logs:[],
    totalAccumulated:0,
    lastMachineReading:0
  },

  {
    name:"Damper Serial Number",
    today:"",
    logs:[],
    totalAccumulated:0,
    lastMachineReading:0
  }

];

let active = 0;
let chart;

/* SAVE */

function saveData(){
  localStorage.setItem(
    "trackers",
    JSON.stringify(trackers)
  );
}

/* ACTIVE */

function current(){
  return trackers[active];
}

/* TABS */

function switchTab(i){
  active = i;
  render();
}

function renderTabs(){

  let html = "";

  trackers.forEach((t,i)=>{

    html += `
      <div
        class="tab ${i===active ? "active" : ""}"
        onclick="switchTab(${i})"
      >
        ${t.name}
      </div>
    `;

  });

  document.getElementById("tabs").innerHTML = html;
}

/* ADD */

function addCounter(){

  trackers.push({

    name:`Counter ${trackers.length+1}`,
    today:"",
    logs:[],
    totalAccumulated:0,
    lastMachineReading:0

  });

  active = trackers.length - 1;

  saveData();
  render();
}

/* DELETE */

function deleteCounter(){

  if(trackers.length === 1){

    alert("Cannot delete last counter.");
    return;

  }

  if(confirm("Delete this counter permanently?")){

    trackers.splice(active,1);

    active = 0;

    saveData();
    render();

  }

}

/* RENAME */

function renameCounter(){

  current().name =
    document.getElementById("counterName").value
    || "Unnamed";

  saveData();
  renderTabs();
}

/* INPUT */

function updateInput(){

  let val =
    document.getElementById("cycleInput")
    .value
    .replace(/[^0-9]/g,"");

  current().today = val;

  saveData();
}

/* QUICK ADD */

function quickAdd(amount){

  let c = Number(current().today || 0);

  current().today = c + amount;

  saveData();
  render();
}

/* SAVE ENTRY */

function saveEntry(){

  let tracker = current();

  let currentReading =
    Number(tracker.today || 0);

  let addedCycles = 0;

  /* NORMAL COUNT */

  if(
    currentReading >=
    tracker.lastMachineReading
  ){

    addedCycles =
      currentReading -
      tracker.lastMachineReading;

  }

  /* MACHINE RESET */

  else{

    addedCycles = currentReading;

  }

  tracker.totalAccumulated += addedCycles;

  tracker.lastMachineReading =
    currentReading;

  let now = new Date();

  tracker.logs.unshift({

    date:now.toLocaleDateString(),

    time:now.toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    }),

    machineReading:currentReading,

    addedCycles:addedCycles,

    accumulated:
      tracker.totalAccumulated

  });

  tracker.today = "";

  saveData();
  render();
}

/* RESET CURRENT */

function resetCurrentCounter(){

  if(confirm("Reset ONLY current counter?")){

    trackers[active] = {

      name:trackers[active].name,

      today:"",
      logs:[],
      totalAccumulated:0,
      lastMachineReading:0

    };

    saveData();
    render();

  }

}

/* GRAPH */

function updateChart(logs){

  let labels =
    [...logs]
    .reverse()
    .map(l=>`${l.date}`);

  let values =
    [...logs]
    .reverse()
    .map(l=>l.accumulated);

  const ctx =
    document.getElementById("progressChart");

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx,{

    type:"line",

    data:{
      labels,

      datasets:[{

        label:"Accumulated Total",

        data:values,

        borderWidth:3,

        tension:.3

      }]
    },

    options:{

      responsive:true,

      plugins:{
        legend:{
          labels:{
            color:"gold"
          }
        }
      },

      scales:{

        x:{
          ticks:{ color:"gold" },
          grid:{ color:"#222" }
        },

        y:{
          ticks:{ color:"gold" },
          grid:{ color:"#222" }
        }

      }

    }

  });

}

/* RENDER */

function render(){

  let t = current();

  let total =
    t.totalAccumulated || 0;

  let percent =
    Math.min(
      (total / TARGET) * 100,
      100
    );

  let avg =
    t.logs.length
    ? Math.round(total / t.logs.length)
    : 0;

  renderTabs();

  document.getElementById("counterName").value =
    t.name;

  document.getElementById("cycleInput").value =
    t.today;

  document.getElementById("totalCycles").innerText =
    total.toLocaleString();

  document.getElementById("progressPercent").innerText =
    percent.toFixed(2) + "%";

  document.getElementById("remaining").innerText =
    (TARGET-total).toLocaleString();

  document.getElementById("avgPerDay").innerText =
    avg.toLocaleString();

  document.getElementById("progressText").innerText =
    `${total.toLocaleString()} / ${TARGET.toLocaleString()}`;

  document.getElementById("progressFill").style.width =
    percent + "%";

  /* LOGS */

  let html = "";

  t.logs.forEach(l=>{

    html += `

      <div class="log">

        <div>

          <div>${l.date}</div>

          <div class="small">
            ${l.time}
          </div>

        </div>

        <div>

          <div>
            Machine:
            ${Number(
              l.machineReading
            ).toLocaleString()}
          </div>

          <div class="small">

            Added:
            +${Number(
              l.addedCycles
            ).toLocaleString()}

          </div>

        </div>

      </div>

    `;

  });

  document.getElementById("logs").innerHTML =
    html;

  updateChart(t.logs);

}

render();

</script>

</body>
</html>
