<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cycle Tracker Pro</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #111, #000);
    color: #ffd700;
    display: flex;
    justify-content: center;
    padding: 25px;
  }

  .container {
    width: 100%;
    max-width: 650px;
  }

  /* GLASS CARD */
  .card {
    background: rgba(20, 20, 20, 0.9);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.05);
    backdrop-filter: blur(10px);
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .tab {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }

  .tab.active {
    background: gold;
    color: black;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  }

  .tab input {
    width: 100%;
    border: none;
    background: transparent;
    color: inherit;
    text-align: center;
    font-weight: bold;
    outline: none;
  }

  /* TITLE */
  h1 {
    margin: 10px 0;
    font-size: 26px;
  }

  /* INPUT */
  input#cycleInput {
    width: 100%;
    font-size: 34px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #0d0d0d;
    color: gold;
    outline: none;
  }

  /* PROGRESS */
  .percent {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
  }

  .bar {
    width: 100%;
    height: 14px;
    background: #222;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
  }

  .fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd700, #ffb300);
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
  }

  /* BUTTONS */
  .row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }

  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .save {
    background: gold;
    color: black;
  }

  .save:hover {
    transform: scale(1.03);
  }

  .reset {
    background: #8b0000;
    color: white;
  }

  .reset:hover {
    transform: scale(1.03);
  }

  /* TOTAL */
  .total {
    margin-top: 10px;
    color: #aaa;
    font-size: 14px;
  }

  /* LOGS */
  .log {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-top: 6px;
    background: #111;
    border-radius: 10px;
    border: 1px solid #222;
  }

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <!-- Tabs -->
    <div class="tabs" id="tabs"></div>

    <!-- Title -->
    <h1 id="title"></h1>

    <!-- Input -->
    <input id="cycleInput" placeholder="Enter today's cycles" oninput="updateInput()" />

    <!-- Progress -->
    <div class="percent" id="percent">0%</div>
    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <!-- Buttons -->
    <div class="row">
      <button class="save" onclick="save()">Save Today</button>
      <button class="reset" onclick="resetAll()">Reset</button>
    </div>

    <div class="total" id="total"></div>

    <div id="logs"></div>

  </div>
</div>

<script>
const TARGET = 1000000;

let trackers = JSON.parse(localStorage.getItem("trackers")) || [
  { name: "Counter 1", today: "", logs: [] },
  { name: "Counter 2", today: "", logs: [] }
];

let active = 0;

function saveData() {
  localStorage.setItem("trackers", JSON.stringify(trackers));
}

function switchTab(i) {
  active = i;
  render();
}

function renameTab(i, value) {
  trackers[i].name = value;
  saveData();
}

function updateInput() {
  let val = document.getElementById("cycleInput")
    .value.replace(/[^0-9]/g, "");

  trackers[active].today = val;
  saveData();
}

function save() {
  let today = new Date().toLocaleDateString();

  trackers[active].logs = trackers[active].logs.filter(l => l.date !== today);

  trackers[active].logs.unshift({
    date: today,
    cycles: Number(trackers[active].today || 0)
  });

  trackers[active].today = "";
  saveData();
  render();
}

function resetAll() {
  if (confirm("Reset everything?")) {
    trackers = [
      { name: "Counter 1", today: "", logs: [] },
      { name: "Counter 2", today: "", logs: [] }
    ];
    active = 0;
    saveData();
    render();
  }
}

function render() {
  let t = trackers[active];

  let total = t.logs.reduce((s, l) => s + Number(l.cycles), 0);
  let percent = Math.min((total / TARGET) * 100, 100);

  document.getElementById("title").innerText = t.name;

  document.getElementById("cycleInput").value = t.today;

  document.getElementById("percent").innerText =
    percent.toFixed(2) + "% Complete";

  document.getElementById("fill").style.width = percent + "%";

  document.getElementById("total").innerText =
    "Total: " + total.toLocaleString() + " / " + TARGET.toLocaleString();

  /* Tabs */
  let tabsHTML = "";
  trackers.forEach((t, i) => {
    tabsHTML += `
      <div class="tab ${i === active ? "active" : ""}">
        <input 
          value="${t.name}"
          oninput="renameTab(${i}, this.value)"
          onclick="switchTab(${i})"
        />
      </div>
    `;
  });

  document.getElementById("tabs").innerHTML = tabsHTML;

  /* Logs */
  let logHTML = "";
  t.logs.forEach(l => {
    logHTML += `
      <div class="log">
        <span>${l.date}</span>
        <span>${Number(l.cycles).toLocaleString()}</span>
      </div>
    `;
  });

  document.getElementById("logs").innerHTML = logHTML;
}

render();
</script>

</body>
</html>
